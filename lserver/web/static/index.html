<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LServer - Control Panel</title>
    <!-- Fuentes modernas: Onest y Fira Code para logs -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Onest:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Paleta de colores Premium */
            --bg-base: #050505;
            --bg-surface: #0a0a0a;
            --bg-card: rgba(18, 18, 18, 0.6);
            --bg-hover: rgba(30, 30, 30, 0.8);
            
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            
            /* Lumax Colors - Oro elegante y Naranja vibrante */
            --brand-primary: #FFB347;
            --brand-secondary: #FF7B00;
            --brand-gradient: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            --brand-glow: rgba(255, 179, 71, 0.15);
            
            /* Estados */
            --success: #10B981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --danger: #EF4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --info: #3B82F6;
            
            /* Tipografia */
            --text-main: #FFFFFF;
            --text-muted: #A1A1AA;
            --text-faint: #52525B;
            
            /* Efectos */
            --blur: blur(12px);
            --shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Onest', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, var(--brand-glow), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.05), transparent 25%);
            background-attachment: fixed;
        }

        /* Nav Header Elegante */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            width: 36px;
            height: 36px;
            background: var(--brand-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            color: var(--bg-base);
            box-shadow: 0 0 15px var(--brand-glow);
        }

        .brand-text h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .brand-text p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .status-pill {
            background: var(--success-bg);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.5px;
        }

        .status-pill::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success);
        }

        /* Container Principal */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .page-header {
            margin-bottom: 2.5rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Grid de Nodos */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.5rem;
        }

        /* Tarjeta de Nodo */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: var(--blur);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            background: var(--bg-hover);
            box-shadow: 0 12px 32px rgba(0,0,0,0.6), 0 0 0 1px var(--border-hover);
        }

        /* Glow superior en la tarjeta */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--brand-gradient);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .card:hover::before { opacity: 1; }

        .card.online { border-top-color: var(--success); }
        .card.offline { border-top-color: var(--text-faint); }
        .card.online::before { background: var(--success); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .node-info h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .node-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .state-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .state-online { background: var(--success-bg); color: var(--success); border: 1px solid rgba(16,185,129,0.2); }
        .state-offline { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border); }

        /* Metricas */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .metric {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-label {
            font-size: 0.7rem;
            color: var(--text-faint);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .metric-val {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
        }
        .metric-val.highlight { color: var(--brand-primary); }

        /* Botones */
        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            flex: 1;
            padding: 0.6rem 0;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: var(--brand-gradient);
            color: var(--bg-base);
            box-shadow: 0 4px 12px var(--brand-glow);
        }
        .btn-primary:hover { filter: brightness(1.1); box-shadow: 0 6px 16px var(--brand-glow); }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger-bg);
        }
        .btn-danger:hover { background: var(--danger-bg); }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }

        /* Log Viewer Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }

        .log-window {
            background: var(--bg-surface);
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-overlay.active .log-window { transform: translateY(0); }

        .log-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
        }
        
        .log-header h3 {
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .log-header h3 span { color: var(--brand-primary); }

        .close-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .close-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        .log-body {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            background: #000;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #d4d4d8;
            line-height: 1.5;
        }
        .log-body::-webkit-scrollbar { width: 8px; }
        .log-body::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }

        /* Toasts Animados */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }

        /* Loading Skeletons */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: load 1.5s infinite;
            border-radius: 16px;
            height: 250px;
            border: 1px solid var(--border);
        }
        @keyframes load { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        @media (max-width: 768px) {
            .container { padding: 1.5rem 1rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="brand">
            <div class="brand-logo">L</div>
            <div class="brand-text">
                <h1>LServer Studio</h1>
                <p>Infrastructure Management</p>
            </div>
        </div>
        <div class="status-pill" id="connStatus">
            Connected
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h2 class="page-title">Instancias Activas</h2>
            <p class="page-subtitle">Monitoreo en tiempo real de recursos y servicios</p>
        </div>

        <div class="grid" id="nodesGrid">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>
    </main>

    <!-- Modal Logs -->
    <div class="modal-overlay" id="logModal" onclick="if(event.target === this) closeLog()">
        <div class="log-window">
            <div class="log-header">
                <h3>Terminal <span>/</span> <span id="logNodeName" style="color: #fff; margin-left: 4px;">node</span></h3>
                <button class="close-btn" onclick="closeLog()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="log-body" id="logContent">
                Esperando datos...
            </div>
        </div>
    </div>

    <div class="toast-container" id="toasts"></div>

    <script>
        let logInterval = null;
        let currentLogNode = null;

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toasts');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    ${type === 'success' ? '<path d="M20 6L9 17l-5-5"/>' : '<circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/>'}
                </svg>
                ${msg}
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        async function fetchNodes() {
            try {
                const res = await fetch('/api/nodes');
                const data = await res.json();
                
                const status = document.getElementById('connStatus');
                status.innerHTML = 'Connected';
                status.style.color = 'var(--success)';
                status.style.borderColor = 'rgba(16,185,129,0.2)';
                status.style.background = 'var(--success-bg)';
                
                renderNodes(data.nodes || []);
            } catch (e) {
                const status = document.getElementById('connStatus');
                status.innerHTML = 'Offline';
                status.style.color = 'var(--text-muted)';
                status.style.borderColor = 'var(--border)';
                status.style.background = 'rgba(255,255,255,0.05)';
            }
        }

        function renderNodes(nodes) {
            const grid = document.getElementById('nodesGrid');
            if (nodes.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 4rem 2rem; border: 1px dashed var(--border); border-radius: 16px;">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-faint)" stroke-width="1.5" style="margin-bottom:1rem;">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
                        </svg>
                        <h3 style="color: var(--text-main); margin-bottom: 0.5rem;">Ningún nodo detectado</h3>
                        <p style="color: var(--text-muted); font-size: 0.9rem;">Crea un servidor usando el CLI: lserver -c &lt;nombre&gt;</p>
                    </div>`;
                return;
            }

            grid.innerHTML = nodes.map(n => `
                <div class="card ${n.status}">
                    <div class="card-header">
                        <div class="node-info">
                            <h2>${n.name}</h2>
                            <div class="node-tags">
                                ${n.is_critical ? '<span class="tag"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--brand-primary)" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Auto-Heal</span>' : ''}
                                ${n.backup_enabled ? '<span class="tag"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Backup</span>' : ''}
                            </div>
                        </div>
                        <div class="state-badge ${n.status === 'online' ? 'state-online' : 'state-offline'}">
                            ${n.status}
                        </div>
                    </div>

                    <div class="metrics-grid">
                        <div class="metric">
                            <span class="metric-label">Uso de CPU</span>
                            <span class="metric-val ${n.cpu !== '—' ? 'highlight' : ''}">${n.cpu}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Memoria RAM</span>
                            <span class="metric-val highlight">${n.ram}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Puerto Activo</span>
                            <span class="metric-val">${n.ports}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Tiempo Uptime</span>
                            <span class="metric-val">${n.uptime}</span>
                        </div>
                    </div>

                    <div class="actions">
                        ${n.status === 'offline' 
                            ? `<button class="btn btn-primary" onclick="action('start', '${n.name}')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg> Arrancar
                               </button>`
                            : `<button class="btn btn-secondary" onclick="action('stop', '${n.name}')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg> Detener
                               </button>`
                        }
                        <button class="btn btn-secondary" onclick="openLog('${n.name}')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5a2 2 0 0 1 2-2h13.4a.5.5 0 0 1 .49.61l-1.5 8.39A2 2 0 0 1 16.43 14H6"/><path d="M4 19v1a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-1"/></svg>
                        </button>
                        <button class="btn btn-danger" onclick="if(confirm('¿Forzar cierre (Kill) de ${n.name}?')) action('kill', '${n.name}')" title="Forzar detención">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function action(type, name) {
            try {
                const res = await fetch(`/api/${type}/${name}`, { method: 'POST' });
                const data = await res.json();
                if (data.error) showToast(data.error, 'error');
                else {
                    showToast(data.message, 'success');
                    fetchNodes();
                }
            } catch (e) {
                showToast('Error de conexión', 'error');
            }
        }

        async function openLog(name) {
            currentLogNode = name;
            const modal = document.getElementById('logModal');
            document.getElementById('logNodeName').textContent = name;
            modal.classList.add('active');
            await updateLog();
            logInterval = setInterval(updateLog, 2000);
        }

        function closeLog() {
            document.getElementById('logModal').classList.remove('active');
            currentLogNode = null;
            clearInterval(logInterval);
        }

        async function updateLog() {
            if (!currentLogNode) return;
            try {
                const res = await fetch(`/api/logs/${currentLogNode}`);
                const data = await res.json();
                const content = document.getElementById('logContent');
                content.textContent = data.logs || data.error || 'Sin registros.';
                content.scrollTop = content.scrollHeight;
            } catch (e) {}
        }

        fetchNodes();
        setInterval(fetchNodes, 3000);
    </script>
</body>
</html>
