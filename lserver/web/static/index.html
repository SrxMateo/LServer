<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LServer Panel - Control de Servidores</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: rgba(22, 27, 34, 0.8);
            --border: rgba(240, 160, 48, 0.15);
            --gold: #f0a030;
            --orange: #ff6600;
            --green: #2ecc71;
            --red: #e74c3c;
            --cyan: #00d4ff;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --glass: rgba(240, 160, 48, 0.05);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Fondo animado */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(240, 160, 48, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255, 102, 0, 0.02) 0%, transparent 50%);
            animation: bgPulse 15s ease-in-out infinite alternate;
            z-index: 0;
        }
        
        @keyframes bgPulse {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-2%, -2%) rotate(3deg); }
        }
        
        /* Header */
        .header {
            position: relative;
            z-index: 10;
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            background: rgba(13, 17, 23, 0.9);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--gold), var(--orange));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            color: #0d1117;
            box-shadow: 0 4px 15px rgba(240, 160, 48, 0.3);
        }
        
        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo-sub {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 2px;
        }
        
        .header-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--green);
        }
        
        .header-status::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.4); }
            50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(46, 204, 113, 0); }
        }
        
        /* Main */
        .main {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }
        
        /* Cards Grid */
        .nodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .node-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .node-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--orange));
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .node-card:hover {
            border-color: rgba(240, 160, 48, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(240, 160, 48, 0.1);
        }
        
        .node-card:hover::before { opacity: 1; }
        
        .node-card.online { border-left: 3px solid var(--green); }
        .node-card.offline { border-left: 3px solid var(--red); }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .card-name {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card-badges { display: flex; gap: 4px; }
        
        .badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .badge-online {
            background: rgba(46, 204, 113, 0.15);
            color: var(--green);
            border: 1px solid rgba(46, 204, 113, 0.3);
        }
        
        .badge-offline {
            background: rgba(231, 76, 60, 0.15);
            color: var(--red);
            border: 1px solid rgba(231, 76, 60, 0.3);
        }
        
        .card-metrics {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .metric {
            text-align: center;
            padding: 10px 4px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        
        .metric-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        
        .metric-value {
            font-size: 15px;
            font-weight: 700;
            color: var(--cyan);
        }
        
        .card-icons {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }
        
        .card-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            flex: 1;
            padding: 8px 0;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn:active { transform: scale(0.96); }
        
        .btn-start {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #fff;
        }
        .btn-start:hover { box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4); }
        
        .btn-stop {
            background: linear-gradient(135deg, var(--gold), var(--orange));
            color: #0d1117;
        }
        .btn-stop:hover { box-shadow: 0 4px 15px rgba(240, 160, 48, 0.4); }
        
        .btn-kill {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
        }
        .btn-kill:hover { box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4); }
        
        .btn-logs {
            background: rgba(0, 212, 255, 0.1);
            color: var(--cyan);
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        .btn-logs:hover { background: rgba(0, 212, 255, 0.2); }
        
        /* Log Viewer */
        .log-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(20px);
        }
        
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
        }
        
        .log-header h3 {
            font-size: 14px;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .log-close {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .log-close:hover { border-color: var(--red); color: var(--red); }
        
        .log-content {
            padding: 16px 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-dim);
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .log-content::-webkit-scrollbar { width: 6px; }
        .log-content::-webkit-scrollbar-track { background: transparent; }
        .log-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }
        
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: rgba(46, 204, 113, 0.9); color: #fff; }
        .toast.error { background: rgba(231, 76, 60, 0.9); color: #fff; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header { padding: 16px; }
            .main { padding: 16px; }
            .nodes-grid { grid-template-columns: 1fr; }
            .card-metrics { grid-template-columns: repeat(2, 1fr); }
        }
        
        /* Loading shimmer */
        .loading {
            background: linear-gradient(90deg, var(--bg-secondary) 25%, rgba(240,160,48,0.05) 50%, var(--bg-secondary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 16px;
            height: 180px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">L</div>
            <div>
                <h1>LServer Panel</h1>
                <div class="logo-sub">Hecho por SrxMateo & Lumax Studio</div>
            </div>
        </div>
        <div class="header-status" id="connectionStatus">Conectado</div>
    </header>
    
    <main class="main">
        <div class="section-title">Nodos del Servidor</div>
        <div class="nodes-grid" id="nodesGrid">
            <div class="loading"></div>
            <div class="loading"></div>
        </div>
        
        <div id="logPanel" class="log-panel" style="display:none;">
            <div class="log-header">
                <h3>📋 Logs: <span id="logNodeName">—</span></h3>
                <button class="log-close" onclick="closeLog()">✕</button>
            </div>
            <div class="log-content" id="logContent">Cargando logs...</div>
        </div>
    </main>
    
    <div class="toast" id="toast"></div>
    
    <script>
        let currentLogNode = null;
        let logInterval = null;
        
        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }
        
        async function fetchNodes() {
            try {
                const res = await fetch('/api/nodes');
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                renderNodes(data.nodes);
                document.getElementById('connectionStatus').textContent = 'Conectado';
            } catch (e) {
                document.getElementById('connectionStatus').textContent = 'Sin conexion';
                document.getElementById('connectionStatus').style.color = '#e74c3c';
            }
        }
        
        function renderNodes(nodes) {
            const grid = document.getElementById('nodesGrid');
            if (!nodes || nodes.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📦</div>
                        <h3>Sin nodos</h3>
                        <p>Crea un nodo con: lserver -c &lt;nombre&gt;</p>
                    </div>`;
                return;
            }
            
            grid.innerHTML = nodes.map(n => `
                <div class="node-card ${n.status}">
                    <div class="card-header">
                        <div class="card-name">
                            ${n.name}
                        </div>
                        <span class="badge badge-${n.status}">
                            ${n.status === 'online' ? '● ONLINE' : '× OFFLINE'}
                        </span>
                    </div>
                    <div class="card-icons">
                        ${n.is_critical ? '❤️ Auto-Heal' : ''} 
                        ${n.backup_enabled ? '💾 Backup' : ''}
                        ${n.restart_time ? '⏰ ' + n.restart_time : ''}
                    </div>
                    <div class="card-metrics">
                        <div class="metric">
                            <div class="metric-label">CPU</div>
                            <div class="metric-value">${n.cpu}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">RAM</div>
                            <div class="metric-value">${n.ram}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Puerto</div>
                            <div class="metric-value">${n.ports}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Uptime</div>
                            <div class="metric-value">${n.uptime}</div>
                        </div>
                    </div>
                    <div class="card-actions">
                        ${n.status === 'offline' 
                            ? `<button class="btn btn-start" onclick="nodeAction('start','${n.name}')">▶ Iniciar</button>`
                            : `<button class="btn btn-stop" onclick="nodeAction('stop','${n.name}')">⏹ Detener</button>`
                        }
                        <button class="btn btn-kill" onclick="if(confirm('Matar ${n.name}?')) nodeAction('kill','${n.name}')">💀 Kill</button>
                        <button class="btn btn-logs" onclick="openLog('${n.name}')">📋 Logs</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function nodeAction(action, name) {
            try {
                const res = await fetch(`/api/${action}/${name}`, { method: 'POST' });
                const data = await res.json();
                if (data.error) {
                    showToast(data.error, 'error');
                } else {
                    showToast(data.message || 'OK');
                    setTimeout(fetchNodes, 1000);
                }
            } catch (e) {
                showToast('Error de conexion', 'error');
            }
        }
        
        async function openLog(name) {
            currentLogNode = name;
            document.getElementById('logPanel').style.display = 'block';
            document.getElementById('logNodeName').textContent = name;
            await refreshLog();
            if (logInterval) clearInterval(logInterval);
            logInterval = setInterval(refreshLog, 2000);
        }
        
        async function refreshLog() {
            if (!currentLogNode) return;
            try {
                const res = await fetch(`/api/logs/${currentLogNode}`);
                const data = await res.json();
                const el = document.getElementById('logContent');
                el.textContent = data.logs || data.error || 'Sin logs';
                el.scrollTop = el.scrollHeight;
            } catch (e) {}
        }
        
        function closeLog() {
            document.getElementById('logPanel').style.display = 'none';
            currentLogNode = null;
            if (logInterval) { clearInterval(logInterval); logInterval = null; }
        }
        
        // Auto-refresh
        fetchNodes();
        setInterval(fetchNodes, 5000);
    </script>
</body>
</html>
